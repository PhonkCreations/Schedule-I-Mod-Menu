<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonk Creations | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@700&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #ffffff; --neon: #00f2ff; --error: #ff003c; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background-color: var(--bg); color: var(--accent); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #canvas-bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }

        /* --- AUTH --- */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s ease; }
        #pass-input { background: transparent; border: none; border-bottom: 1px solid rgba(255, 255, 255, 0.1); color: var(--accent); font-size: 1.2rem; text-align: center; padding: 12px; outline: none; width: 280px; letter-spacing: 4px; font-family: 'Roboto Mono', monospace; }
        #pass-input:focus { border-bottom: 1px solid var(--neon); }
        #error-msg { margin-top: 20px; color: var(--error); font-size: 0.6rem; opacity: 0; font-family: 'Roboto Mono', monospace; }

        /* --- MAIN --- */
        #main-content { opacity: 0; filter: blur(20px); transition: 1.5s ease; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .logo { position: absolute; top: 40px; left: 40px; font-family: 'Poppins', sans-serif; letter-spacing: 6px; opacity: 0.6; font-size: 0.8rem; }
        .menu-wrapper { position: absolute; top: 40px; right: 40px; z-index: 100; }
        .line { width: 30px; height: 1px; background: #fff; margin: 6px 0; }
        .dropdown { position: absolute; top: 50px; right: 0; background: rgba(255,255,255,0.02); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; opacity: 0; visibility: hidden; transition: 0.4s; min-width: 220px; text-align: right; }
        .dropdown.open { opacity: 1; visibility: visible; transform: translateY(10px); }
        .nav-link { color: #fff; text-decoration: none; display: block; margin: 10px 0; cursor: pointer; font-size: 1.1rem; }
        .submenu { display: none; margin-top: 10px; }
        .submenu.show { display: block; }
        .submenu a { color: #666; display: block; padding: 5px 0; text-decoration: none; font-size: 0.8rem; }

        /* --- MODAL --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 10000; opacity: 0; transition: 0.4s; }
        .modal-content { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 500px; padding: 30px; border-radius: 15px; }
        .mod-title { color: var(--neon); font-family: 'Poppins'; margin-bottom: 15px; }
        .download-btn { display: block; width: 100%; padding: 15px; background: var(--neon); color: #000; text-align: center; text-decoration: none; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 20px; border: none; }
        #pc-warning { color: var(--error); font-size: 0.7rem; text-align: center; margin-top: 10px; display: none; font-family: 'Roboto Mono'; }
        
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>

    <div id="auth-screen">
        <h2 style="font-size:0.6rem; color:#444; letter-spacing:5px; margin-bottom:20px;">SYSTEM ACCESS</h2>
        <input type="password" id="pass-input" placeholder="ENTER KEY" autofocus>
        <p id="error-msg">ACCESS DENIED</p>
    </div>

    <div id="main-content">
        <div class="logo">PHONK CREATIONS</div>
        <div class="menu-wrapper">
            <div onclick="document.getElementById('dropdown').classList.toggle('open')">
                <div class="line"></div><div class="line"></div>
            </div>
            <div class="dropdown" id="dropdown">
                <span class="nav-link" onclick="document.getElementById('submenu').classList.toggle('show')">CHEATS</span>
                <div class="submenu" id="submenu">
                    <a onclick="openMod()">Schedule 1</a>
                </div>
                <a href="#" class="nav-link">DISCORD</a>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modModal" onclick="closeMod()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="mod-title">Mod Menu V1</h3>
            <p style="font-size:0.8rem; color:#888;">F8 to open menu. Features: God Mode, Money, NoClip, Fly, Teleport.</p>
            <button class="download-btn" onclick="handleDownload()">DOWNLOAD DLL</button>
            <p id="pc-warning">ERROR: WINDOWS PC REQUIRED</p>
        </div>
    </div>

    <script>
        // Partículas
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function initP() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<40; i++) particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, vx:(Math.random()-0.5)*0.2, vy:(Math.random()-0.5)*0.2});
        }
        function drawP() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="rgba(255,255,255,0.2)";
            particles.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,1,0,Math.PI*2);ctx.fill();p.x+=p.vx;p.y+=p.vy;});
            requestAnimationFrame(drawP);
        }
        initP(); drawP();

        // Login (phonktop1)
        document.getElementById('pass-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (e.target.value === 'phonktop1') {
                    document.getElementById('auth-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('main-content').style.opacity = '1';
                        document.getElementById('main-content').style.filter = 'blur(0px)';
                    }, 1000);
                } else {
                    e.target.classList.add('shake');
                    document.getElementById('error-msg').style.opacity = '1';
                    setTimeout(() => e.target.classList.remove('shake'), 400);
                }
            }
        });

        function openMod() { document.getElementById('modModal').style.display='flex'; setTimeout(()=>document.getElementById('modModal').style.opacity='1',10); }
        function closeMod() { document.getElementById('modModal').style.opacity='0'; setTimeout(()=>document.getElementById('modModal').style.display='none',400); }

        function handleDownload() {
            const isPC = !/Android|iPhone|iPad/i.test(navigator.userAgent);
            if (isPC) {
                // Esto busca el archivo SewerMenu.dll que subiste a GitHub al lado del index.html
                window.location.href = "SewerMenu.dll";
            } else {
                document.getElementById('pc-warning').style.display = 'block';
            }
        }
    </script>
</body>
</html>
