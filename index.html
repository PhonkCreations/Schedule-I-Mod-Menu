<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHONK CREATIONS | MULTI-MODS</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .container {
            border: 2px solid #00ff00;
            padding: 40px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 20px #00ff00;
            z-index: 2;
        }
        h1 { font-size: 2.5em; text-transform: uppercase; letter-spacing: 5px; }
        .menu-box { margin-top: 20px; }
        .btn {
            background: transparent;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 15px 30px;
            margin: 10px;
            cursor: pointer;
            font-size: 1.2em;
            transition: 0.3s;
            display: inline-block;
            text-decoration: none;
        }
        .btn:hover { background: #00ff00; color: #000; box-shadow: 0 0 15px #00ff00; }
        #password-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input { background: transparent; border: 1px solid #00ff00; color: #00ff00; padding: 10px; text-align: center; font-size: 1.2em; outline: none; }
    </style>
</head>
<body>

    <div id="password-screen">
        <h1>PHONK CREATIONS</h1>
        <p>ENTER ACCESS CODE</p>
        <input type="password" id="pass" placeholder="********">
        <br><br>
        <button class="btn" onclick="checkPass()">ACCESS</button>
    </div>

    <div class="container" id="main-content" style="display:none;">
        <h1>PHONK CREATIONS</h1>
        <p>SELECT YOUR GAME</p>
        
        <div class="menu-box">
            <a href="#" class="btn" onclick="alert('GTA 5 Mod Menu: Coming Soon...')">GTA 5 MODS</a>
            <a href="#" class="btn" onclick="alert('CS2 Mod Menu: Coming Soon...')">CS2 MODS</a>
        </div>
        
        <p style="margin-top: 30px; font-size: 0.8em; opacity: 0.5;">SYSTEM UPDATED - V2.0</p>
    </div>

    <script>
        function checkPass() {
            const p = document.getElementById('pass').value;
            if(p === "phonktop1") {
                document.getElementById('password-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                alert("ACCESS DENIED");
            }
        }
    </script>
</body>
</html>
